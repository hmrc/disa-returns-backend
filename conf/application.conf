include "backend.conf"

# This is the main configuration file for the application.
# ~~~~~

appName = disa-returns-backend

# Default http client
play.modules.enabled += "uk.gov.hmrc.play.bootstrap.HttpClientV2Module"

# Play Modules
play.modules.enabled += "uk.gov.hmrc.disareturnsbackend.Module"

play.modules.enabled += "uk.gov.hmrc.mongo.play.PlayMongoModule"

play.modules.enabled += "uk.gov.hmrc.objectstore.client.play.modules.ObjectStoreModule"

# The application languages
# ~~~~~
play.i18n.langs = ["en"]

# Router
# ~~~~~
# Define the Router object to use for this application.
# This router will be looked up first when the application is starting up,
# so make sure this is the entry point.
# Furthermore, it's assumed your route file is named properly.
# So for an application router like `my.application.Router`,
# you may need to define a router file `conf/my.application.routes`.
# Default to Routes in the root package (and conf/routes)
# !!!WARNING!!! DO NOT CHANGE THIS ROUTER
play.http.router = prod.Routes

# Controller
# ~~~~~
# By default all controllers will have authorisation, logging and
# auditing (transaction monitoring) enabled.
# The below controllers are the default exceptions to this rule.

controllers {

}

# Microservice specific config

mongodb {
  uri = "mongodb://localhost:27017/disa-returns-backend"
  monthlyReturnTimeToLiveInDays = 20
}

microservice {
  services {
    auth {
      host = localhost
      port = 8500
    }

    internal-auth {
      protocol = http
      host     = localhost
      port     = 8470
    }

    object-store {
      protocol = http
      host     = localhost
      port     = 8464
    }

    disa-returns-submission {
      protocol = http
      host     = localhost
      port     = 12103
    }
  }
}

contexts {
  # Coordinates monthly-return file-upload work-item polling and status updates.
  monthly-return-file-upload-work-item {
    type = Dispatcher
    executor = "fork-join-executor"

    fork-join-executor {
      # Minimum number of background worker threads.
      parallelism-min = 2
      # Scales the worker pool size relative to available processors.
      parallelism-factor = 1.0
      # Upper limit for the background worker pool.
      parallelism-max = 8
    }
  }

  # Runs blocking file-upload work away from the main worker pool.
  file-upload-blocking {
    # Uses a dedicated Pekko dispatcher for blocking file-upload work.
    type = Dispatcher
    # Uses a fixed thread pool rather than the default fork-join executor.
    executor = "thread-pool-executor"
    # Processes one mailbox batch per worker turn to keep blocking tasks fair.
    throughput = 1

    thread-pool-executor {
      # Maximum number of blocking file-upload tasks that can run at once.
      fixed-pool-size = 4
    }
  }
}

monthly-return-file-upload-work-item-job {
  # How often the work item job queue is polled
  pollInterval = 1 second
  # How long to wait before retrying failed WorkItems
  failedRetryAfter = 1 minute
  # How long to wait before retrying stuck in-progress WorkItems
  inProgressRetryAfter = 5 minutes
}

# Maximum invalid row entries stored inline on monthly return validation results.
# The full errors workbook still contains all row-level validation errors.
fileUploadMaxInlineErrors = 25

# InternalAuthTokenInitialiser will ensure this token is valid for object store on app start
internal-auth.token = "valid-internal-auth-token-disa-returns-backend"

# How long a file will remain in object-store before being automatically deleted
object-store.default-retention-period = 1-month

# Enables local-only InternalAuthTokenInitialiser so it can
# set up object store READ, WRITE, DELETE permissions for the internal-auth.token
create-internal-auth-token-on-start = true

# First day of a monthly return period
declarationPeriodStart = 6
# Last day of a monthly return period
declarationPeriodEnd = 19

play.temporaryFile {
  # Cleans up files periodically produced by play.api.libs.Files.TemporaryFileCreator
  reaper {
    enabled = true

    # How long to wait after the app starts before the first scan
    initialDelay = 0 minutes

    # The interval between subsequent scans
    interval = 5 minutes

    # How long a file must be idle before it's eligible for deletion
    olderThan = 10 minutes
  }
}
