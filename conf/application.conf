include "backend.conf"

# This is the main configuration file for the application.
# ~~~~~

appName = disa-returns-backend

# Default http client
play.modules.enabled += "uk.gov.hmrc.play.bootstrap.HttpClientV2Module"

# Play Modules
play.modules.enabled += "uk.gov.hmrc.disareturnsbackend.Module"

play.modules.enabled += "uk.gov.hmrc.mongo.play.PlayMongoModule"

# The application languages
# ~~~~~
play.i18n.langs = ["en"]

# Router
# ~~~~~
# Define the Router object to use for this application.
# This router will be looked up first when the application is starting up,
# so make sure this is the entry point.
# Furthermore, it's assumed your route file is named properly.
# So for an application router like `my.application.Router`,
# you may need to define a router file `conf/my.application.routes`.
# Default to Routes in the root package (and conf/routes)
# !!!WARNING!!! DO NOT CHANGE THIS ROUTER
play.http.router = prod.Routes

# Controller
# ~~~~~
# By default all controllers will have authorisation, logging and
# auditing (transaction monitoring) enabled.
# The below controllers are the default exceptions to this rule.

controllers {

}

# Microservice specific config

mongodb {
  uri = "mongodb://localhost:27017/disa-returns-backend"
}

microservice {
  services {
    auth {
      host = localhost
      port = 8500
    }

    disa-returns-stubs {
      host = localhost
      port = 1204
    }
  }
}

contexts {
  # Dispatcher for blocking CSV parsing and file I/O work.
  blocking {
    fork-join-executor {
      # Minimum number of threads kept available for blocking work.
      parallelism-min = 4
      # Scales the pool size relative to available processors.
      parallelism-factor = 2.0
      # Upper limit for the blocking pool.
      parallelism-max = 16
    }
  }

  # Dispatcher used by the CSV processing background job and related work-item execution.
  csv-processing-job {
    fork-join-executor {
      # Minimum number of background worker threads.
      parallelism-min = 2
      # Scales the worker pool size relative to available processors.
      parallelism-factor = 1.0
      # Upper limit for the background worker pool.
      parallelism-max = 8
    }
  }

  # Dispatcher used by the XLSX processing background job and related work-item execution.
  xlsx-processing-job {
    fork-join-executor {
      # Minimum number of background worker threads.
      parallelism-min = 2
      # Scales the worker pool size relative to available processors.
      parallelism-factor = 1.0
      # Upper limit for the background worker pool.
      parallelism-max = 8
    }
  }
}

xlsxProcessingQueue {
  inProgressRetryAfter = 5 minutes
}

xlsxProcessingJob {
  # Optional absolute path for the XLSX processing job report.
  reportFile = ${?XLSX_PROCESSING_JOB_REPORT_FILE}
}

play.temporaryFile {
  reaper {
    # Enable or disable the reaper (enabled by default)
    enabled = true

    # How long a file must be idle before it's eligible for deletion
    olderThan = 5 minutes

    # How long to wait after the app starts before the first scan
    initialDelay = 0 minutes

    # The interval between subsequent scans
    interval = 1 minutes
  }
}
